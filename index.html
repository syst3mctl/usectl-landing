        function handleFoundingSubmit() {
            clearErrors();
            const name = document.getElementById('founding-name').value.trim();
            const email = document.getElementById('founding-email').value.trim();
            const project = document.getElementById('founding-project').value.trim();
            const deploy = document.getElementById('founding-deploy').value;
            const password = document.getElementById('founding-password').value;
            const confirmPassword = document.getElementById('founding-confirm-password').value;

            let hasError = false;

            if (!name) {
                showError('error-name', 'Name is required');
                hasError = true;
            }
            if (!email) {
                showError('error-email', 'Email is required');
                hasError = true;
            } else if (!validateEmail(email)) {
                showError('error-email', 'Please enter a valid email');
                hasError = true;
            }
            if (!password) {
                showError('error-password', 'Password is required');
                hasError = true;
            }
            if (!confirmPassword) {
                showError('error-confirm-password', 'Please confirm your password');
                hasError = true;
            } else if (password !== confirmPassword) {
                showError('error-confirm-password', 'Passwords do not match');
                hasError = true;
            }

            if (hasError) return;

            const btn = document.getElementById('founding-submit');
            btn.textContent = 'Submitting...';
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.7';

            fetch('https://manager.usectl.com/api/founding-requests', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name,
                    email,
                    project,
                    deploy_method: deploy,
                    password
                })
            }).then(async res => {
                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    if (data.error === "an account with this email already exists") {
                        showNotification("An account with this email already exists", "error");
                        showError('error-email', 'Email already registered');
                    } else {
                        throw new Error(data.error || 'Failed');
                    }
                    return;
                }
                btn.textContent = '✓ You\'re on the list!';
                btn.style.background = '#0e8c24';
                btn.style.opacity = '1';
                showNotification("Successfully joined as a founding member! Redirecting...", "success");
                
                // Redirect to login page after 2 seconds
                setTimeout(() => {
                    window.location.href = 'https://manager.usectl.com/login';
                }, 2000);
            }).catch((err) => {
                btn.textContent = 'Claim My Founding Spot';
                btn.style.pointerEvents = '';
                btn.style.opacity = '1';
                if (err.message !== "Email already registered") {
                    showNotification(err.message || "Something went wrong. Please try again.", "error");
                }
            });
        }

        function showNotification(message, type = 'success') {
            const container = document.getElementById('notification-container');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <div class="notification-content">
                    <span class="notification-icon">${type === 'success' ? '✓' : '✕'}</span>
                    <span class="notification-message">${message}</span>
                </div>
                <div class="notification-progress"></div>
            `;
            container.appendChild(notification);

            // Trigger entrance animation
            setTimeout(() => notification.classList.add('show'), 10);

            // Remove after 5 seconds
            const timer = setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 400);
            }, 5000);

            notification.onclick = () => {
                clearTimeout(timer);
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 400);
            };
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            if (el) {
                el.textContent = msg;
                el.style.display = 'block';
                const input = el.previousElementSibling;
                if (input && input.classList.contains('founding-input')) {
                    input.style.borderColor = '#ff5f57';
                }
            }
        }

        function clearErrors() {
            document.querySelectorAll('.founding-error').forEach(el => {
                el.textContent = '';
                el.style.display = 'none';
            });
            document.querySelectorAll('.founding-input').forEach(input => {
                input.style.borderColor = '';
            });
        }

        function validateEmail(email) {
            return String(email)
                .toLowerCase()
                .match(
                    /^(([^<>()[\]\\.,;:\s@"]+(\.[^<>()[\]\\.,;:\s@"]+)*)|(".+"))@((\[[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\])|(([a-zA-Z\-0-9]+\.)+[a-zA-Z]{2,}))$/
                );
        }

        function togglePasswordVisibility(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('svg');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        // Nav background scroll effect now handled in animations.js via GSAP ScrollTrigger


        // Smooth appear for step toggles
        document.querySelectorAll('.step-toggle .toggle').forEach(t => {
            t.addEventListener('click', () => t.classList.toggle('off'));
        });
